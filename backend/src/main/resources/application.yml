server:
  port: 8080

spring:
  application:
    name: taskflow
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DATABASE_USERNAME:taskflow}
    password: ${DATABASE_PASSWORD:taskflow}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt-secret: ${JWT_SECRET:local-development-secret-change-before-production}
  jwt-expiration-ms: 86400000
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
